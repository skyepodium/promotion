<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      data-i18n-content="home.meta.description"
      content="skyepodium의 작업과 서비스를 소개하는 정적 프로모션 사이트"
    />
    <title data-i18n="home.meta.title">skyepodium</title>
    <link rel="stylesheet" href="./assets/styles/site.css" />
    <script src="./assets/scripts/site.js" defer></script>
  </head>
  <body class="home-page">
    <header class="site-header" aria-label="주요 탐색" data-i18n-aria-label="common.header.aria">
      <a class="brand-link" href="./index.html" aria-label="skyepodium 홈" data-i18n-aria-label="common.home.aria">
        skyepodium
      </a>
      <div class="header-tools">
        <nav class="nav-links" aria-label="페이지" data-i18n-aria-label="common.nav.aria">
          <a href="./kitsnyang.html">키츠냥</a>
        </nav>
        <div class="language-switcher" aria-label="언어 선택" data-i18n-aria-label="common.language.aria">
          <button type="button" data-language-option="ko" aria-label="한국어" data-i18n-aria-label="common.language.ko">
            KO
          </button>
          <button type="button" data-language-option="en" aria-label="English" data-i18n-aria-label="common.language.en">
            EN
          </button>
          <button type="button" data-language-option="ja" aria-label="日本語" data-i18n-aria-label="common.language.ja">
            JA
          </button>
          <button
            type="button"
            data-language-option="zh-TW"
            aria-label="繁體中文"
            data-i18n-aria-label="common.language.zhTW"
          >
            TW
          </button>
          <button
            type="button"
            data-language-option="vi"
            aria-label="Tiếng Việt"
            data-i18n-aria-label="common.language.vi"
          >
            VI
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="home-hero" aria-labelledby="home-title">
        <p class="eyebrow" data-i18n="home.hero.eyebrow">작은 서비스, 선명한 상호작용.</p>
        <h1 id="home-title" data-i18n-html="home.hero.title">작게 만들고,<br />오래 쓰게 다듬습니다.</h1>
        <p class="home-lead" data-i18n-html="home.hero.lead">
          앱, 도구, 장난감 같은 서비스를 만들고 고칩니다. 지금은 아침 알람 앱
          <a href="./kitsnyang.html">키츠냥</a>을 정리 중입니다.
        </p>
        <div class="home-actions" aria-label="대표 작업" data-i18n-aria-label="home.actions.aria">
          <a class="text-arrow" href="./kitsnyang.html" data-i18n="home.hero.cta">키츠냥 보기</a>
        </div>
      </section>

      <section class="home-project" aria-labelledby="project-title">
        <div>
          <p class="eyebrow">Project 01</p>
          <h2 id="project-title">키츠냥</h2>
        </div>
        <p data-i18n="home.project.body">무료, 광고 없음, 여러 알림음. 아침을 조금 덜 미워하게 만드는 알람.</p>
        <a
          class="project-card-link"
          href="./kitsnyang.html"
          aria-label="키츠냥 소개 페이지로 이동"
          data-i18n-aria-label="home.project.linkAria"
        >
          <span>Service page</span>
          <strong>kitsnyang.html</strong>
        </a>
      </section>
    </main>
  </body>
</html>
